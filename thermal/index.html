<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Observability - Thermal Guardian v2.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0b0c10; 
            --pane: #161719; 
            --border: #26262b; 
            --primary: #32d4f5; 
            --text: #ffffff; 
            --text-dim: #94a3b8;
            --crit: #f2495c; 
            --warn: #fbbf24;
            --ok: #10b981;
        }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg) !important; 
            color: var(--text) !important; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow-x: hidden;
        }

        /* Grafana-Style Header */
        header { 
            background: var(--pane); 
            border-bottom: 1px solid var(--border); 
            padding: 12px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 60px;
        }
        .logo { color: var(--primary); font-weight: 900; letter-spacing: 2px; font-size: 14px; }
        select { 
            background: #000; 
            color: var(--primary); 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-size: 13px;
            outline: none;
        }

        .dashboard-container { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Top 5 Critical Grid */
        .critical-section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .critical-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        .crit-card { 
            background: var(--pane); 
            border: 1px solid var(--border); 
            padding: 16px; 
            border-radius: 4px; 
            border-left: 4px solid var(--crit);
        }
        .crit-card h4 { margin: 0; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .crit-card .val { font-size: 26px; font-weight: 300; margin-top: 8px; font-variant-numeric: tabular-nums; }

        /* Middle Diagnostics Section */
        .workspace-grid { 
            display: grid; 
            grid-template-columns: 1fr 350px; 
            gap: 20px; 
        }
        .panel { 
            background: var(--pane); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 4px; 
        }
        h3 { font-size: 13px; margin: 0 0 15px 0; color: var(--text-dim); text-transform: uppercase; }

        /* Full Width Bottom Graph */
        .trend-panel { width: 100%; margin-bottom: 20px; }
        .chart-wrapper { width: 100%; height: 350px; position: relative; }

        /* Metric Highlights */
        .metric-row { display: flex; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <div class="logo">GRAFANA // EV_THERMAL_GUARDIAN</div>
    <select id="vehicle-selector">
        <option value="">Search Fleet Nodes...</option>
    </select>
</header>

<div class="dashboard-container">
    <div>
        <div class="critical-section-title">Critical Nodes (Highest Thermal Delta)</div>
        <div id="critical-grid" class="critical-grid">
            </div>
    </div>

    <div class="workspace-grid">
        <div class="panel" id="focus-panel">
            <h3>Diagnostic Workspace</h3>
            <div id="focus-content" style="color: var(--text-dim); text-align:center; padding: 40px;">
                Select a critical node for detailed explainability.
            </div>
        </div>
        <div class="panel">
            <h3>Fleet Risk Distribution</h3>
            <canvas id="benchmarkChart"></canvas>
        </div>
    </div>

    <div class="panel trend-panel">
        <h3>24-Hour Fleet Thermal Stress Line</h3>
        <div class="chart-wrapper">
            <canvas id="trendChart"></canvas>
        </div>
    </div>
</div>

<script>
// Mock data for AI Studio Preview mode
const mockFleet = [
    { name: "Van #402", delta: 38.4, bTemp: 52, drift: 2.1, status: 'crit' },
    { name: "Truck #881", delta: 32.1, bTemp: 48, drift: 0.8, status: 'crit' },
    { name: "Sprinter #12", delta: 29.5, bTemp: 44, drift: 5.4, status: 'warn' },
    { name: "Service #09", delta: 24.2, bTemp: 40, drift: 9.2, status: 'warn' },
    { name: "Transit #55", delta: 18.1, bTemp: 35, drift: 1.2, status: 'ok' }
];

let fleetData = [];

// Geotab Bridge
window.geotab = window.geotab || {};
geotab.addin = geotab.addin || {};

geotab.addin['ev-maintenance-hub'] = function () {
    return {
        initialize: function (api, state, callback) {
            fetchGeotabData(api);
            callback();
        }
    };
};

function fetchGeotabData(api) {
    api.multiCall([
        ['Get', { typeName: 'Device' }],
        ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticInternalBatteryTemperatureId' }, latestOnly: true } }],
        ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticAmbientAirTemperatureId' }, latestOnly: true } }]
    ], function(results) {
        const [devs, bTemps, aTemps] = results;
        fleetData = devs.map(d => {
            const b = (bTemps.find(t => t.device.id === d.id) || {data: 35}).data;
            const a = (aTemps.find(t => t.device.id === d.id) || {data: 20}).data;
            return { name: d.name, delta: b - a, bTemp: b, drift: 0 }; // Drift logic requires weather API
        });
        renderUI(fleetData);
    });
}

function renderUI(data) {
    const grid = document.getElementById('critical-grid');
    const selector = document.getElementById('vehicle-selector');
    
    // Sort by Delta
    const sorted = [...data].sort((a,b) => b.delta - a.delta).slice(0, 5);
    
    grid.innerHTML = '';
    sorted.forEach(v => {
        const card = document.createElement('div');
        card.className = 'crit-card';
        card.style.borderLeftColor = v.delta > 30 ? 'var(--crit)' : 'var(--warn)';
        card.innerHTML = `<h4>${v.name}</h4><div class="val">${v.delta.toFixed(1)}°C</div>`;
        grid.appendChild(card);
        
        const opt = document.createElement('option');
        opt.value = v.name; opt.textContent = v.name;
        selector.appendChild(opt);
    });
}

// Charts Initialization
const ctxTrend = document.getElementById('trendChart').getContext('2d');
new Chart(ctxTrend, {
    type: 'line',
    data: {
        labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
        datasets: [{
            label: 'Avg Fleet Delta',
            data: [14, 12, 22, 36, 30, 18, 15],
            borderColor: '#32d4f5',
            backgroundColor: 'rgba(50, 212, 245, 0.05)',
            fill: true,
            tension: 0.4,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { 
                grid: { color: '#26262b' }, 
                ticks: { color: '#888', font: { family: 'monospace' } },
                title: { display: true, text: 'DELTA °C', color: '#5c5c5e' }
            },
            x: { grid: { display: false }, ticks: { color: '#888' } }
        },
        plugins: { legend: { display: false } }
    }
});

const ctxBench = document.getElementById('benchmarkChart').getContext('2d');
new Chart(ctxBench, {
    type: 'doughnut',
    data: {
        labels: ['Critical', 'Warning', 'Healthy'],
        datasets: [{
            data: [5, 12, 83],
            backgroundColor: ['#f2495c', '#fbbf24', '#10b981'],
            borderWidth: 0
        }]
    },
    options: {
        cutout: '80%',
        plugins: { legend: { position: 'bottom', labels: { color: '#888', boxWidth: 10 } } }
    }
});

// Default to mock data if not in Geotab
if (!window.location.origin.includes('geotab')) {
    renderUI(mockFleet);
}
</script>

</body>
</html>
