<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>EV Thermal Guardian Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --green: #10b981; --yellow: #fbbf24; --red: #ef4444; --text: #f8fafc; }
        body { margin:0; padding:20px; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout Sections */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-shrink: 0; }
        .main-content { display: grid; grid-template-columns: 300px 1fr; gap: 30px; flex-grow: 1; overflow: hidden; }
        
        /* Sidebar Alerts */
        .sidebar { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); overflow-y: auto; }
        .alert-item { padding: 12px; border-radius: 8px; margin-bottom: 10px; background: rgba(15, 23, 42, 0.3); border-left: 4px solid var(--green); }
        .alert-item.warn { border-left-color: var(--yellow); }
        .alert-item.crit { border-left-color: var(--red); background: rgba(239, 68, 68, 0.1); }

        /* Focus Card */
        .focus-area { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .modern-card { background: var(--card); border: 2px solid var(--border); border-radius: 24px; padding: 30px; position: relative; transition: 0.4s; }
        .status-tag { position: absolute; top: 20px; right: 20px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        
        /* Graph Container */
        .graph-container { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); height: 250px; }

        /* Form Elements */
        select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 16px; outline: none; cursor: pointer; min-width: 250px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-box { text-align: center; padding: 15px; background: rgba(15, 23, 42, 0.4); border-radius: 12px; }
        .stat-val { font-size: 24px; font-weight: 800; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div>
        <h1 style="margin:0; font-size: 20px; color: var(--green);">🌡️ Thermal Guardian Command</h1>
        <p style="margin:5px 0 0 0; font-size: 12px; color: #64748b;">Fleet Wide Monitoring Mode</p>
    </div>
    <select id="vehicle-selector">
        <option value="">Select Vehicle to Inspect...</option>
    </select>
</div>

<div class="main-content">
    <div class="sidebar">
        <h3 style="margin-top:0; font-size: 14px; color: #94a3b8;">CRITICAL THERMAL DELTAS</h3>
        <div id="alert-list">Scanning...</div>
    </div>

    <div class="focus-area">
        <div id="focus-card-container">
            <div style="text-align:center; padding: 50px; color: #64748b;">Select a vehicle from the menu to begin diagnostics.</div>
        </div>
        <div class="graph-container">
            <canvas id="longevityChart"></canvas>
        </div>
    </div>
</div>

<script>
geotab.addin['ev-maintenance-hub'] = function () {
    let _api;
    let fleetData = [];
    let chartInstance = null;

    const getStatusInfo = (delta, drift) => {
        if (delta > 32 || drift > 10) return { color: '#ef4444', label: 'Critical', class: 'crit' };
        if (delta > 22 || drift > 6) return { color: '#fbbf24', label: 'Warning', class: 'warn' };
        return { color: '#10b981', label: 'Healthy', class: 'ok' };
    };

    const updateFocusCard = (vId) => {
        const vehicle = fleetData.find(v => v.id === vId);
        const container = document.getElementById('focus-card-container');
        if (!vehicle) return;

        const status = getStatusInfo(vehicle.delta, vehicle.drift);
        
        container.innerHTML = `
            <div class="modern-card" style="border-color: ${status.color}">
                <span class="status-tag" style="background: ${status.color}; color: #000;">${status.label}</span>
                <h2 style="margin:0;">${vehicle.name}</h2>
                <div class="stat-grid">
                    <div class="stat-box"><span style="color:#94a3b8; font-size:10px;">THERMAL DELTA</span><span class="stat-val" style="color:${status.color}">${vehicle.delta.toFixed(1)}°C</span></div>
                    <div class="stat-box"><span style="color:#94a3b8; font-size:10px;">SENSOR DRIFT</span><span class="stat-val">${vehicle.drift.toFixed(1)}°C</span></div>
                    <div class="stat-box"><span style="color:#94a3b8; font-size:10px;">BATT TEMP</span><span class="stat-val">${vehicle.bTemp.toFixed(1)}°C</span></div>
                </div>
                <div style="margin-top:20px; font-size: 13px; color: #94a3b8;">
                    <strong>Diagnostic Report:</strong> ${status.label === 'Healthy' ? 'No cooling obstructions detected.' : 'Increased thermal delta detected during charge. Recommend inspection of coolant filter and pump voltage.'}
                </div>
            </div>
        `;
    };

    const renderChart = () => {
        const ctx = document.getElementById('longevityChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        // Mock data showing "Hours spent in High Heat Zone" over the last 7 days
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Fleet Thermal Stress (Hours > 35°C)',
                    data: [4, 7, 3, 8, 12, 5, 2],
                    backgroundColor: '#10b981',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } }
            }
        });
    };

    const runFleetScan = (api) => {
        api.multiCall([
            ['Get', { typeName: 'Device' }],
            ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticInternalBatteryTemperatureId' }, latestOnly: true } }],
            ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticAmbientAirTemperatureId' }, latestOnly: true } }],
            ['Get', { typeName: 'DeviceStatusInfo' }]
        ], async (results) => {
            const [devs, bTemps, aTemps, locs] = results;
            const selector = document.getElementById('vehicle-selector');
            const alertList = document.getElementById('alert-list');
            
            fleetData = devs.map(dev => {
                const bVal = (bTemps.find(t => t.device.id === dev.id) || {data: 28}).data;
                const aVal = (aTemps.find(t => t.device.id === dev.id) || {data: 22}).data;
                const loc = locs.find(l => l.device.id === dev.id) || {latitude:0, longitude:0};
                return { id: dev.id, name: dev.name, bTemp: bVal, aTemp: aVal, delta: bVal - aVal, drift: 0, lat: loc.latitude, lon: loc.longitude };
            });

            // Fetch Weather for Drift logic
            for (let v of fleetData) {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${v.lat}&longitude=${v.lon}&current_weather=true`).then(r => r.json());
                v.drift = Math.abs(res.current_weather.temperature - v.aTemp);
            }

            // Populate Selector
            fleetData.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = v.name;
                selector.appendChild(opt);
            });

            // Populate Sidebar (Top 3 Highest Delta)
            const sorted = [...fleetData].sort((a, b) => b.delta - a.delta).slice(0, 3);
            alertList.innerHTML = '';
            sorted.forEach(v => {
                const status = getStatusInfo(v.delta, v.drift);
                const item = document.createElement('div');
                item.className = `alert-item ${status.class}`;
                item.innerHTML = `<strong>${v.name}</strong><br><small>Delta: ${v.delta.toFixed(1)}°C</small>`;
                alertList.appendChild(item);
            });

            renderChart();
        });
    };

    return {
        initialize: function (api, state, callback) {
            _api = api;
            document.getElementById('vehicle-selector').onchange = (e) => updateFocusCard(e.target.value);
            runFleetScan(_api);
            callback();
        }
    };
};
</script>
</body>
</html>
