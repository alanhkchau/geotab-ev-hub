<!DOCTYPE html><html><head><meta charset='utf-8'>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
<script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
<style>
  @keyframes pulse { 0% { border-color: #334155; } 50% { border-color: #ef4444; box-shadow: 0 0 15px #ef4444; } 100% { border-color: #334155; } }
  .card { background:#1e293b; border:2px solid #334155; padding:20px; border-radius:16px; margin-bottom:20px; }
  .low-battery { animation: pulse 2s infinite; border-width: 3px; }
</style></head>
<body style='margin:0;padding:20px;font-family:sans-serif;background:#0f172a;color:#f8fafc;'>
<div id='ev-grid' style='display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:20px;'></div>
<script>
geotab.addin['ev-maintenance-hub'] = function () {
  return {
    initialize: function (api, state, callback) {
      const apiKey = '1f8d4ccf-672a-4321-a636-e185900d38be';
      api.multiCall([
        ['Get', { typeName: 'Device' }],
        ['Get', { typeName: 'DeviceStatusInfo' }],
        ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticStateOfChargeId' }, latestOnly: true } }],
        ['Get', { typeName: 'StatusData', search: { diagnosticSearch: { id: 'DiagnosticBatteryStateOfHealthId' }, latestOnly: true } }]
      ], function (results) {
        const [devs, locs, socs, sohs] = results;
        const container = document.getElementById('ev-grid');
        devs.forEach((dev, i) => {
          const soc = (socs.find(s => s.device.id === dev.id) || {data:0}).data;
          const soh = (sohs.find(s => s.device.id === dev.id) || {data:100}).data;
          const loc = locs.find(l => l.device.id === dev.id) || {latitude:0, longitude:0};
          const isLow = soc < 20;
          
          const card = document.createElement('div');
          card.className = 'card' + (isLow ? ' low-battery' : '');
          card.innerHTML = `<h3>${dev.name}</h3><div id="map-${i}" style="height:150px; border-radius:8px;"></div>
                            <p>SOC: ${soc}% | SOH: ${soh.toFixed(1)}%</p>`;
          container.appendChild(card);
          
          const map = L.map(`map-${i}`, {zoomControl:false}).setView([loc.latitude, loc.longitude], 12);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
          L.circleMarker([loc.latitude, loc.longitude], {color:'#38bdf8', radius:8}).addTo(map);
          
          fetch(`https://api.openchargemap.io/v3/poi/?key=${apiKey}&latitude=${loc.latitude}&longitude=${loc.longitude}&distance=20&levelid=3&maxresults=1`)
            .then(r => r.json()).then(data => {
              if(data[0]) L.circleMarker([data[0].AddressInfo.Latitude, data[0].AddressInfo.Longitude], {color:'#10b981', radius:6}).addTo(map);
            });
        });
        callback();
      });
    }
  };
};
</script></body></html>
